volumes:
  n8n_data:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: vanguard_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:            # <--- ¡ESTA ES LA LÍNEA CLAVE!
      - ../.env          # <--- Le dice que lea el .env de la carpeta raíz
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
